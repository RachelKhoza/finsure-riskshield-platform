trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

parameters:
  - name: environment
    displayName: Target environment
    type: string
    default: dev
    values:
      - dev
      - prod

variables:
  - group: finsure-riskshield-shared
  - group: finsure-riskshield-${{ parameters.environment }}
  - name: imageRepository
    value: riskshield-service
  - name: imageTag
    value: $(Build.BuildId)
  - name: foundationDir
    value: $(Build.SourcesDirectory)/terraform/stacks/foundation
  - name: appDir
    value: $(Build.SourcesDirectory)/terraform/stacks/app
  - name: backendConfig
    value: $(Build.SourcesDirectory)/terraform/backend.foundation.${{ parameters.environment }}.hcl
  - name: appBackendConfig
    value: $(Build.SourcesDirectory)/terraform/backend.app.${{ parameters.environment }}.hcl

stages:
  - stage: Build
    displayName: Build, test, scan, push
    jobs:
      - job: BuildAndPush
        displayName: Build and push image
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: Use Node.js 22
            inputs:
              versionSpec: 22.x

          - script: |
              set -euo pipefail
              npm ci
              npm test
            displayName: Run unit tests
            workingDirectory: $(Build.SourcesDirectory)/app

          - task: Docker@2
            displayName: Build and push Docker image
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(Build.SourcesDirectory)/app/Dockerfile
              buildContext: $(Build.SourcesDirectory)/app
              containerRegistry: $(acrServiceConnection)
              tags: |
                $(imageTag)
                latest

          - script: |
              set -euo pipefail
              if command -v trivy >/dev/null 2>&1; then
                trivy image --exit-code 1 --severity HIGH,CRITICAL "$(acrLoginServer)/$(imageRepository):$(imageTag)"
              else
                echo "Trivy not installed on this agent; skipping optional image scan."
              fi
            displayName: Optional image scan
            continueOnError: true

  - stage: Infrastructure
    displayName: Provision foundation
    dependsOn: Build
    jobs:
      - job: Foundation
        displayName: Terraform foundation apply
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: 1.8.5

          - task: AzureCLI@2
            displayName: Terraform apply foundation and seed Key Vault secret
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                cd "$(foundationDir)"
                terraform init -backend-config="$(backendConfig)"
                terraform fmt -check -recursive ../..
                terraform plan \
                  -var-file="env/${{ parameters.environment }}.tfvars" \
                  -out=tfplan
                terraform apply -auto-approve tfplan

                KEY_VAULT_NAME="$(terraform output -raw key_vault_name)"
                az keyvault secret set \
                  --vault-name "$KEY_VAULT_NAME" \
                  --name "$(riskShieldSecretName)" \
                  --value "$(RiskShieldApiKey)" \
                  --only-show-errors 1>/dev/null

  - stage: Deploy
    displayName: Deploy application
    dependsOn: Infrastructure
    jobs:
      - ${{ if eq(parameters.environment, 'prod') }}:
          - job: ProductionApproval
            displayName: Manual production approval
            pool: server
            steps:
              - task: ManualValidation@1
                inputs:
                  notifyUsers: $(approvalNotifyUsers)
                  instructions: Review the Terraform plan, image scan results, and change ticket before approving production.
                  onTimeout: reject
                timeoutInMinutes: 1440

      - deployment: DeployContainerApp
        displayName: Terraform deploy Container App
        environment: finsure-riskshield-${{ parameters.environment }}
        ${{ if eq(parameters.environment, 'prod') }}:
          dependsOn: ProductionApproval
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: 1.8.5

                - task: AzureCLI@2
                  displayName: Terraform apply app
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      cd "$(appDir)"
                      terraform init -backend-config="$(appBackendConfig)"
                      terraform plan \
                        -var-file="env/${{ parameters.environment }}.tfvars" \
                        -var="image_repository=$(imageRepository)" \
                        -var="image_tag=$(imageTag)" \
                        -var="riskshield_secret_name=$(riskShieldSecretName)" \
                        -out=tfplan
                      terraform apply -auto-approve tfplan

                      APP_URL="$(terraform output -raw app_url)"
                      echo "Smoke testing $APP_URL/healthz"
                      curl -fsS "$APP_URL/healthz"
